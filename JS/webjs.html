<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //js variable data value types
        //primitive :immutable single value and stores in memory.
        //string===
        var myName = "gourav";
        console.log("myName is "+myName);
        console.log(typeof myName);
        //number
        var myNum = 464564564564;
        console.log("myNum is "+myNum);
        console.log(typeof myNum);

        //boolen
        var isMarried=true;
        console.log(myName+" is married "+isMarried);
        console.log(typeof isMarried);
        //undefined
        var myAdd;
        console.log(myName+" address is "+myAdd);
        console.log(typeof myAdd);
        //null
        var myEmail=null;
        console.log(myName+" email is "+myEmail);
        console.log(typeof myEmail);

        //bigint
        var myValue =BigInt("874328742742798427328872672");
        console.log(myValue);
        console.log(typeof myValue);
        //symbol
        var val1=Symbol("hello");
        var val2=Symbol("hello");
        console.log(val1==val2);
        console.log(typeof (val1) + " and " + typeof (val2)); 

        //refrence or non primitive data value types==============
        //object-  values are defined in paired of key value
        let myInfo={
            name:"gourav",
            age:23,
            mob:9575958794,
            eMail:"gaurav.aggarwal@gmail.com ",
            isMarried:false,
            address:null,
            branch:"CSE",
            section:18
        }
        console.log(myInfo);
        //to find the length of object
        console.log(Object.keys(myInfo).length);
        console.log(myInfo.branch);
        //array-collection of any data typesin JS
        let studentDetails=["gourav",
        24,
        false,
        "gourav.ag@gmail.com",
        "GZB"];
        console.log(studentDetails[2]);
        console.log(studentDetails.length);

        for (let i=0;i<studentDetails.length;i++){
            console.log(studentDetails[i]);
        }
        //funcction- block of code which perform a specific task
        function myCal(){
            let num1=5;
            let num2=10;
            let result=num1+num2;
            console.log("Addition of two number is " +(num1+num2));
            console.log(result);

        }
        myCal();
        
        

        

    </script>
</body>
</html>
